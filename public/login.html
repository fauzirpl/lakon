<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LAKON Gantt System</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                  var(--bg-primary);
      overflow-x: hidden;
    }
  </style>
</head>
<body class="dark-theme">
  <!-- Glowing decorative blobs behind glass card -->
  <div class="glow-blob blob-1"></div>
  <div class="glow-blob blob-2"></div>

  <div class="auth-container glass">
    <div class="auth-header">
      <div class="auth-logo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0V18m0-1.5H9m0 1.5v1.5m0-1.5h7.5m0 0V18m0-1.5h1.5M9 18h7.5" />
        </svg>
        <span>LAKON</span>
      </div>
      <h1>Welcome to LAKON</h1>
      <p>Organize, schedule, and execute your projects with visual timeline clarity.</p>
    </div>

    <!-- Auth Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alert Message Banner -->
    <div id="alert-box" class="alert hidden"></div>

    <!-- Login Form -->
    <form id="form-login" class="auth-form" onsubmit="handleAuth(event, 'login')">
      <div class="form-group">
        <label for="login-username">Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <input type="text" id="login-username" name="username" placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>
      
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        <span class="btn-text">Sign In</span>
        <span class="spinner hidden"></span>
      </button>
    </form>

    <!-- Register Form -->
    <form id="form-register" class="auth-form hidden" onsubmit="handleAuth(event, 'register')">
      <div class="form-group">
        <label for="register-username">Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <input type="text" id="register-username" name="username" placeholder="Choose a username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="register-password">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input type="password" id="register-password" name="password" placeholder="Min 6 characters" required autocomplete="new-password">
        </div>
      </div>

      <div class="form-group">
        <label for="register-confirm">Confirm Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
          <input type="password" id="register-confirm" placeholder="Repeat your password" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        <span class="btn-text">Create Account</span>
        <span class="spinner hidden"></span>
      </button>
    </form>
    
    <div class="auth-footer">
      <p>Secure login with standard encryption. Powered by Node.js MySQL.</p>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');
      const loginForm = document.getElementById('form-login');
      const registerForm = document.getElementById('form-register');
      const alertBox = document.getElementById('alert-box');

      alertBox.classList.add('hidden');
      alertBox.className = 'alert hidden';

      if (tab === 'login') {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }
    }

    async function handleAuth(event, type) {
      event.preventDefault();
      
      const form = event.target;
      const alertBox = document.getElementById('alert-box');
      const submitBtn = form.querySelector('button[type="submit"]');
      const btnText = submitBtn.querySelector('.btn-text');
      const spinner = submitBtn.querySelector('.spinner');

      if (type === 'register') {
        const password = document.getElementById('register-password').value;
        const confirm = document.getElementById('register-confirm').value;
        if (password !== confirm) {
          showAlert('Passwords do not match.', 'error');
          return;
        }
      }

      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => data[key] = value);

      submitBtn.disabled = true;
      btnText.style.opacity = '0.7';
      spinner.classList.remove('hidden');
      alertBox.classList.add('hidden');

      try {
        const response = await fetch(`/api/auth/${type}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
          if (type === 'login') {
            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
              window.location.href = '/index.html';
            }, 1000);
          } else {
            showAlert('Registration successful! Please log in.', 'success');
            switchTab('login');
            document.getElementById('login-username').value = data.username;
            document.getElementById('login-password').focus();
          }
        } else {
          showAlert(result.message || 'Authentication failed.', 'error');
        }
      } catch (error) {
        showAlert('Network or server error occurred. Please try again.', 'error');
        console.error(error);
      } finally {
        submitBtn.disabled = false;
        btnText.style.opacity = '1';
        spinner.classList.add('hidden');
      }
    }

    function showAlert(message, type) {
      const alertBox = document.getElementById('alert-box');
      alertBox.textContent = message;
      alertBox.className = `alert alert-${type}`;
      alertBox.classList.remove('hidden');
    }
  </script>
</body>
</html>
